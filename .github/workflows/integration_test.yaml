name: Flutter Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drive_android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        api-level: [29]
      fail-fast: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          script: flutter test integration_test/app_test.dart -d android
          working-directory: example

  drive_ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      matrix:
        simulator: [{os: "18.6", model: "iPhone SE (3rd generation)"}]
      fail-fast: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - uses: futureware-tech/simulator-action@e89aa8f93d3aec35083ff49d2854d07f7186f7f5 # v5
        with:
          wait_for_boot: true
          os: iOS
          os_version: ${{ matrix.simulator.os }}
          model: ${{ matrix.simulator.model }}
      - name: Pre-build the app
        working-directory: example
        run: flutter build ios --simulator --target=integration_test/app_test.dart
      - name: Run flutter integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d iphone

  drive_macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d macos

  drive_windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d windows

  drive_linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # GTK build deps for the Linux desktop runner; libgtk-3-dev pulls in
      # GdkPixbuf with its built-in JPEG/PNG loaders. The WebP/HEIF loaders are
      # intentionally not installed, so the WebP path exercises the
      # codecUnavailable branch. xvfb provides a headless display.
      - name: Install Linux build and GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - name: Run Flutter Integration tests
        working-directory: example
        run: xvfb-run -a flutter test integration_test/app_test.dart -d linux

  drive_web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - name: Setup chromedriver
        run: |
          npx @puppeteer/browsers install chromedriver@stable
          chromedriver --port=4444 &
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d web-server
