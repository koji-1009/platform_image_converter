name: Flutter Integration Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drive_android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        api-level: [29]
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          script: flutter test integration_test/app_test.dart -d android
          working-directory: example

  drive_ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - name: Select an available iPhone simulator on iOS 26.x
        id: simulator
        run: |
          udid=$(xcrun simctl list devices --json \
            | jq -r '[ .devices | to_entries[]
                       | select(.key | contains("iOS-26-"))
                       | .value[]
                       | select(.isAvailable and (.name | contains("iPhone"))) ]
                     | .[0].udid // empty')
          if [ -z "$udid" ]; then
            echo "::error::No available iPhone simulator found for iOS 26.x"
            xcrun simctl list devices
            exit 1
          fi
          echo "Selected iPhone simulator (iOS 26.x): $udid"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
      - uses: futureware-tech/simulator-action@e89aa8f93d3aec35083ff49d2854d07f7186f7f5 # v5
        with:
          wait_for_boot: true
          udid: ${{ steps.simulator.outputs.udid }}
      - name: Pre-build the app
        working-directory: example
        run: flutter build ios --simulator --target=integration_test/app_test.dart
      - name: Run flutter integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d ${{ steps.simulator.outputs.udid }}

  drive_macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d macos

  drive_windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter test integration_test/app_test.dart -d windows

  drive_linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # GTK build deps for the Linux desktop runner; libgtk-3-dev pulls in
      # GdkPixbuf with its built-in JPEG/PNG loaders. The WebP/HEIF loaders are
      # intentionally not installed, so the WebP path exercises the
      # codecUnavailable branch. xvfb provides a headless display.
      - name: Install Linux build and GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - name: Run Flutter Integration tests
        working-directory: example
        run: xvfb-run -a flutter test integration_test/app_test.dart -d linux

  drive_web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@26fb6927d2874fcc9b3af19cb4cf5cd66ec18a28 # v1.3.0
      - name: Setup chromedriver
        run: |
          npx @puppeteer/browsers install chromedriver@stable
          chromedriver --port=4444 &
      - name: Run Flutter Integration tests
        working-directory: example
        run: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/app_test.dart -d web-server
